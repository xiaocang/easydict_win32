name: ARM64 MSIX Smoke Test

on:
  workflow_dispatch:
    inputs:
      runtime_profile:
        description: 'Hybrid-only runtime payload profile. Enter hybrid explicitly for retained-worker coexistence.'
        required: false
        default: ''
        type: string

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  RUNTIME_PROFILE: ${{ github.event.inputs.runtime_profile || '' }}

jobs:
  arm64-msix-smoke:
    name: Build + Launch MSIX (ARM64)
    runs-on: [self-hosted, Windows, ARM64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Require explicit hybrid profile for dotnet/MSIX smoke
        shell: pwsh
        run: |
          $profile = "${{ env.RUNTIME_PROFILE }}".Trim().ToLowerInvariant().Replace("_", "-")
          if ($profile -eq "rust-only" -or $profile -eq "rustonly") {
            throw "The first rs release is portable-only. Use easydict_packager pack-rs-portable instead of the dotnet/MSIX smoke path with runtime_profile=${{ env.RUNTIME_PROFILE }}."
          }
          if ($profile -ne "hybrid") {
            throw "runtime_profile=${{ env.RUNTIME_PROFILE }} is not supported for dotnet/MSIX smoke. Use explicit hybrid for retained-worker coexistence, or easydict_packager pack-rs-portable for the rs package."
          }
          "RUNTIME_PROFILE=hybrid" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RETAINED_WORKERS_ENABLED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: dotnet/global.json

      - name: Setup WinApp CLI
        shell: pwsh
        run: |
          # Workaround: install winapp CLI directly via winget instead of
          # microsoft/setup-WinAppCli action, which fails to extract on
          # runners < 2.311.0 (Expand-Archive rejects extensionless temp files).
          $installed = winget list --id Microsoft.WinAppCli --source winget --accept-source-agreements 2>$null
          if ($LASTEXITCODE -eq 0 -and $installed -match 'Microsoft.WinAppCli') {
            Write-Host "Microsoft.WinAppCli is already installed, skipping."
          } else {
            winget install Microsoft.WinAppCli --source winget --accept-package-agreements --accept-source-agreements --silent
          }

      - name: Restore WinUI project (arm64)
        working-directory: dotnet
        shell: pwsh
        run: |
          dotnet restore src/Easydict.WinUI/Easydict.WinUI.csproj --runtime win-arm64 -p:Configuration=Release -p:BuildWorkerOutputs=false -p:EnableInProcLongDocFallback=false -p:RuntimeProfile=${{ env.RUNTIME_PROFILE }}

      - name: Clean publish output directory (arm64)
        shell: pwsh
        run: |
          $publishDir = "dotnet/publish-msix/arm64"
          if (Test-Path $publishDir) {
            Remove-Item -Path $publishDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null

      - name: Publish WinUI App for MSIX (arm64)
        working-directory: dotnet
        shell: pwsh
        run: |
          dotnet publish src/Easydict.WinUI/Easydict.WinUI.csproj `
            --configuration Release `
            --runtime win-arm64 `
            --self-contained true `
            --no-restore `
            --output ./publish-msix/arm64 `
            -p:Platform=arm64 `
            -p:BuildWorkerOutputs=false `
            -p:EnableInProcLongDocFallback=false `
            -p:RuntimeProfile=${{ env.RUNTIME_PROFILE }} `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -p:WindowsAppSDKSelfContained=false

      - name: Prepare Windows App SDK AI metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packageId = 'microsoft.windowsappsdk.ai'
          $index = Invoke-RestMethod "https://api.nuget.org/v3-flatcontainer/$packageId/index.json"
          $versions = @($index.versions)
          $version = $versions | Where-Object { $_ -notmatch '-' } | Select-Object -Last 1
          if (-not $version) {
            $version = $versions | Select-Object -Last 1
          }
          if (-not $version) {
            throw "No Microsoft.WindowsAppSDK.AI package versions were returned by NuGet"
          }

          $packageRoot = Join-Path $env:RUNNER_TEMP 'windows-app-sdk-ai'
          $extractRoot = Join-Path $packageRoot $version
          New-Item -ItemType Directory -Force -Path $extractRoot | Out-Null

          $nupkg = Join-Path $packageRoot "$packageId.$version.nupkg"
          Invoke-WebRequest `
            -Uri "https://api.nuget.org/v3-flatcontainer/$packageId/$version/$packageId.$version.nupkg" `
            -OutFile $nupkg
          tar -xf $nupkg -C $extractRoot
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to extract $nupkg"
          }

          $metadataDir = Join-Path $extractRoot 'metadata'
          foreach ($file in @(
            'Microsoft.Windows.AI.winmd',
            'Microsoft.Windows.AI.Foundation.winmd',
            'Microsoft.Windows.AI.Text.winmd'
          )) {
            $path = Join-Path $metadataDir $file
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Microsoft.WindowsAppSDK.AI $version did not contain $file under metadata/"
            }
          }

          "EASYDICT_WINDOWS_APP_SDK_AI_METADATA_DIR=$metadataDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EASYDICT_WINDOWS_AI_REQUIRE_WINRT_BINDINGS=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Using Microsoft.WindowsAppSDK.AI $version metadata from $metadataDir"

      - name: Publish Rust helper executables (arm64)
        working-directory: dotnet
        shell: pwsh
        run: |
          ./scripts/Build-RustHelpers.ps1 `
            -Platform arm64 `
            -Configuration Release `
            -OutputDir ./publish-msix/arm64 `
            -RuntimeProfile "${{ env.RUNTIME_PROFILE }}" `
            -IncludeLegacyRegistrarAlias

      - name: Publish LongDoc Worker (arm64)
        if: env.RETAINED_WORKERS_ENABLED == 'true'
        working-directory: dotnet
        shell: pwsh
        run: |
          dotnet publish src/Easydict.Workers.LongDoc/Easydict.Workers.LongDoc.csproj `
            --configuration Release `
            --runtime win-arm64 `
            --no-self-contained `
            --output ./publish-msix/arm64/workers/longdoc `
            -p:Platform=arm64 `
            -p:RuntimeProfile=${{ env.RUNTIME_PROFILE }} `
            -p:PublishTrimmed=false `
            -p:WindowsAppSDKSelfContained=false

      - name: Publish LocalAi Worker (arm64)
        if: env.RETAINED_WORKERS_ENABLED == 'true'
        working-directory: dotnet
        shell: pwsh
        run: |
          dotnet publish src/Easydict.Workers.LocalAi/Easydict.Workers.LocalAi.csproj `
            --configuration Release `
            --runtime win-arm64 `
            --no-self-contained `
            --output ./publish-msix/arm64/workers/localai `
            -p:Platform=arm64 `
            -p:RuntimeProfile=${{ env.RUNTIME_PROFILE }} `
            -p:PublishTrimmed=false `
            -p:WindowsAppSDKSelfContained=false

      - name: Dedupe worker shared files (arm64)
        if: env.RETAINED_WORKERS_ENABLED == 'true'
        working-directory: dotnet
        shell: pwsh
        run: |
          ./scripts/Dedupe-WorkerSharedFiles.ps1 `
            -PublishDir ./publish-msix/arm64 `
            -RuntimeProfile "${{ env.RUNTIME_PROFILE }}"

      - name: Bundle .NET 8 Runtime (arm64)
        if: env.RETAINED_WORKERS_ENABLED == 'true'
        shell: pwsh
        working-directory: dotnet
        run: |
          ./scripts/Extract-DotnetRuntime.ps1 `
            -Rid win-arm64 `
            -OutputDir ./publish-msix/arm64/dotnet `
            -RuntimeProfile "${{ env.RUNTIME_PROFILE }}"

      - name: Package MSIX (shared script)
        shell: pwsh
        run: |
          dotnet/scripts/Package-Msix.ps1 `
            -Platform "arm64" `
            -PublishDir "dotnet/publish-msix/arm64" `
            -ManifestPath "dotnet/src/Easydict.WinUI/Package.appxmanifest" `
            -OutputMsixPath "dotnet/msix/Easydict-arm64-smoke.msix" `
            -RuntimeProfile "${{ env.RUNTIME_PROFILE }}" `
            -VerifyTargetsizeIcons

      - name: Validate MSIX (identity, MinVersion, runtime payload)
        shell: pwsh
        working-directory: dotnet
        run: |
          cargo run --manifest-path ../rs/Cargo.toml -p easydict_msix_validate -- `
            "msix/Easydict-arm64-smoke.msix" `
            --runtime-profile "${{ env.RUNTIME_PROFILE }}" `
            --allow-unsigned

      - name: Trust signing certificate
        shell: pwsh
        run: |
          $pfxPath = Join-Path $HOME "Downloads/dev-signing.pfx"
          $password = ConvertTo-SecureString -String "password" -Force -AsPlainText
          Import-PfxCertificate -FilePath $pfxPath -Password $password `
            -CertStoreLocation "Cert:\LocalMachine\TrustedPeople"
          Write-Host "Signing certificate trusted"

      - name: Sign MSIX package
        shell: pwsh
        run: |
          $pfxPath = Join-Path $HOME "Downloads/dev-signing.pfx"
          winapp sign "dotnet/msix/Easydict-arm64-smoke.msix" $pfxPath --password "password" --verbose

      - name: Validate signed MSIX (runtime payload)
        shell: pwsh
        working-directory: dotnet
        run: |
          cargo run --manifest-path ../rs/Cargo.toml -p easydict_msix_validate -- `
            "msix/Easydict-arm64-smoke.msix" `
            --runtime-profile "${{ env.RUNTIME_PROFILE }}"

      - name: Enable Developer Mode (sideloading)
        shell: pwsh
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" `
            /t REG_DWORD /v AllowDevelopmentWithoutDevLicense /d 1 /f

      - name: Install Windows App Runtime (arm64)
        shell: pwsh
        run: |
          $url = "https://aka.ms/windowsappsdk/2.0/latest/windowsappruntimeinstall-arm64.exe"
          $installer = Join-Path $env:TEMP "windowsappruntimeinstall-arm64.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--quiet","--force" -Wait -NoNewWindow
          Write-Host "Windows App Runtime arm64 installed"

      - name: Install MSIX package
        shell: pwsh
        run: |
          $existing = Get-AppxPackage -Name "xiaocang.EasydictforWindows" -ErrorAction SilentlyContinue
          if ($existing) {
            Write-Host "Removing existing package: $($existing.PackageFullName)"
            Remove-AppxPackage -Package $existing.PackageFullName
            Write-Host "Old package removed"
          }
          $msixPath = Resolve-Path "dotnet/msix/Easydict-arm64-smoke.msix"
          Add-AppxPackage -Path $msixPath

      - name: Launch app and verify main window appears
        shell: pwsh
        run: |
          $package = Get-AppxPackage -Name "xiaocang.EasydictforWindows" -ErrorAction SilentlyContinue
          if (-not $package) {
            Write-Error "Package not installed"
            exit 1
          }

          $appId = "shell:AppsFolder\$($package.PackageFamilyName)!App"
          Start-Process "explorer.exe" $appId
          Write-Host "Launched: $appId"

          $deadline = (Get-Date).AddSeconds(60)
          $windowFound = $false

          while ((Get-Date) -lt $deadline) {
            $uiProcs = Get-Process -Name "Easydict.WinUI" -ErrorAction SilentlyContinue
            if ($uiProcs) {
              foreach ($proc in $uiProcs) {
                if ($proc.MainWindowHandle -ne 0) {
                  Write-Host "Main window detected. PID=$($proc.Id), Title=$($proc.MainWindowTitle)"
                  $windowFound = $true
                  break
                }
              }
            }

            if ($windowFound) { break }
            Start-Sleep -Seconds 2
          }

          if (-not $windowFound) {
            Write-Error "App did not show a main window within timeout"
            Get-Process -Name "Easydict.WinUI" -ErrorAction SilentlyContinue | Format-Table Id, ProcessName, MainWindowTitle
            exit 1
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: easydict-arm64-smoke-msix
          path: dotnet/msix/Easydict-arm64-smoke.msix
