name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - '.winstore/**'
      - 'screenshot/**'
      - 'LICENSE'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - '.winstore/**'
      - 'screenshot/**'
      - 'LICENSE'

jobs:
  rust-only-boundary:
    name: Rust-only boundary
    runs-on: windows-latest
    env:
      EASYDICT_RUNTIME_PROFILE: rust-only
      RUNTIME_PROFILE: rust-only

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Rust-only boundary tests
        working-directory: rs
        run: |
          cargo test -p easydict_packager --test release_contract_behavior ci_workflow_runs_default_rs_rust_only_boundary_tests -- --exact --nocapture
          cargo test -p easydict_packager --test release_contract_behavior pack_rs_portable_creates_and_validates_zip_without_retained_dotnet_payload -- --exact --nocapture
          cargo test -p easydict_app runtime_policy --lib -- --nocapture
          cargo test -p easydict_app --test default_api_boundary_behavior -- --nocapture
          cargo test -p easydict_app --test cli_translate_behavior local_ai_cli_app_dir_ignores_stale_dotnet_payload_markers -- --exact --nocapture
          cargo test -p easydict_app --test long_document_cli_behavior app_dir_ignores_stale_dotnet_payload_markers_and_does_not_enable_worker_lookup -- --exact --nocapture

  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: dotnet/global.json

      - name: Restore dependencies
        working-directory: dotnet
        run: dotnet restore Easydict.Win32.sln -p:Platform=x64 -p:BuildWorkerOutputs=false

      - name: Build
        working-directory: dotnet
        run: dotnet build Easydict.Win32.sln --configuration Debug --no-restore -p:Platform=x64 -p:BuildWorkerOutputs=false

      - name: Run tests
        working-directory: dotnet
        run: dotnet test Easydict.Win32.sln --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" -p:Platform=x64 --filter "Category!=WinUI&Category!=Integration&Category!=UIAutomation&Category!=Performance&Category!=UIFreeze"

      - name: Run long-document regression gate
        working-directory: dotnet
        run: dotnet test Easydict.Win32.sln --no-build --verbosity normal --logger "trx;LogFileName=longdoc-test-results.trx" -p:Platform=x64 --filter "FullyQualifiedName~LongDocument&Category!=UIFreeze"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: dotnet/**/TestResults/*.trx
