name: Nightly Memory Profile

on:
  schedule:
    - cron: '17 19 * * *'

concurrency:
  group: nightly-memory-profile-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  MEMORY_RESULTS_BRANCH: scratch/memory-nightly
  MEMORY_RESULTS_RETENTION_DAYS: 60
  EASYDICT_RUNTIME_PROFILE: rust-only
  RUNTIME_PROFILE: rust-only

jobs:
  nightly-memory-profile:
    name: Nightly Memory Profile
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check for new commits since last memory profile
        id: memory_gate
        shell: pwsh
        run: |
          dotnet/scripts/memory/Test-MemoryProfileShouldRun.ps1 `
            -BranchName $env:MEMORY_RESULTS_BRANCH `
            -SourceSha $env:GITHUB_SHA

      - name: Setup .NET
        if: steps.memory_gate.outputs.should_run == 'true'
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: dotnet/global.json

      - name: Install Windows App Runtime
        if: steps.memory_gate.outputs.should_run == 'true'
        shell: pwsh
        run: |
          $url = "https://aka.ms/windowsappsdk/2.0/latest/windowsappruntimeinstall-x64.exe"
          $installer = Join-Path $env:TEMP "windowsappruntimeinstall-x64.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--quiet","--force" -Wait -NoNewWindow

      - name: Restore WinUI app
        if: steps.memory_gate.outputs.should_run == 'true'
        working-directory: dotnet
        run: dotnet restore src/Easydict.WinUI/Easydict.WinUI.csproj --runtime win-x64 -p:BuildWorkerOutputs=false -p:EnableInProcLongDocFallback=false -p:RuntimeProfile=${{ env.RUNTIME_PROFILE }}

      - name: Publish WinUI app
        if: steps.memory_gate.outputs.should_run == 'true'
        working-directory: dotnet
        run: |
          dotnet publish src/Easydict.WinUI/Easydict.WinUI.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            --no-restore `
            --output ./publish/x64 `
            -p:Platform=x64 `
            -p:BuildWorkerOutputs=false `
            -p:EnableInProcLongDocFallback=false `
            -p:RuntimeProfile=${{ env.RUNTIME_PROFILE }} `
            -p:PublishTrimmed=false `
            -p:WindowsAppSDKSelfContained=false

      - name: Collect nightly memory profile
        if: steps.memory_gate.outputs.should_run == 'true'
        shell: pwsh
        run: |
          dotnet/scripts/memory/Invoke-NightlyMemoryProfile.ps1 `
            -AppExePath "dotnet/publish/x64/Easydict.WinUI.exe" `
            -OutputDir "artifacts/memory-gate/nightly" `
            -DurationSeconds 180 `
            -EnableWprReferenceSet

      - name: Upload memory artifacts
        if: always() && steps.memory_gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-memory-profile
          path: artifacts/memory-gate/nightly
          retention-days: 14

      - name: Publish comparable results to scratch branch
        if: always() && steps.memory_gate.outputs.should_run == 'true'
        shell: pwsh
        run: |
          dotnet/scripts/memory/Publish-MemoryProfileScratchBranch.ps1 `
            -SourceDir "artifacts/memory-gate/nightly" `
            -BranchName $env:MEMORY_RESULTS_BRANCH `
            -RunId $env:GITHUB_RUN_ID `
            -RunAttempt $env:GITHUB_RUN_ATTEMPT `
            -SourceSha $env:GITHUB_SHA `
            -SourceRef $env:GITHUB_REF_NAME `
            -RetentionDays $env:MEMORY_RESULTS_RETENTION_DAYS `
            -RetentionRuns 60
