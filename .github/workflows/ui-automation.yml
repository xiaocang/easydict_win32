name: UI Automation Tests

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - '.winstore/**'
      - 'screenshot/**'
      - 'LICENSE'

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  # ── Job 1: Shared Build & Package ──
  build:
    name: Build & Package
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: dotnet/global.json

      - name: Setup WinApp CLI
        uses: microsoft/setup-WinAppCli@v0.1

      - name: Restore dependencies
        working-directory: dotnet
        run: dotnet restore src/Easydict.WinUI/Easydict.WinUI.csproj --runtime win-x64 -p:BuildWorkerOutputs=false

      - name: Publish WinUI App (x64)
        working-directory: dotnet
        run: |
          dotnet publish src/Easydict.WinUI/Easydict.WinUI.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            --output ./publish/x64 `
            -p:Platform=x64 `
            -p:BuildWorkerOutputs=false `
            -p:PublishTrimmed=false `
            -p:WindowsAppSDKSelfContained=false

      - name: Verify MSIX assets
        shell: pwsh
        run: |
          $publishDir = "dotnet/publish/x64"
          $requiredAssets = @(
            "Assets/SplashScreen.scale-100.png",
            "Assets/LockScreenLogo.scale-100.png",
            "Assets/Square150x150Logo.scale-100.png",
            "Assets/Square44x44Logo.scale-100.png",
            "Assets/Wide310x150Logo.scale-100.png",
            "Assets/StoreLogo.png"
          )

          $missing = @()
          foreach ($asset in $requiredAssets) {
            $path = Join-Path $publishDir $asset
            if (-not (Test-Path $path)) {
              $missing += $asset
            }
          }

          if ($missing.Count -gt 0) {
            Write-Error "Missing required MSIX assets:"
            $missing | ForEach-Object { Write-Error "  - $_" }
            exit 1
          }

          Write-Host "All required MSIX assets verified."

      - name: Fix resources.pri for MSIX
        shell: pwsh
        run: |
          $publishDir = "dotnet/publish/x64"
          $sourcePri = Join-Path $publishDir "Easydict.WinUI.pri"
          $targetPri = Join-Path $publishDir "resources.pri"

          if (Test-Path $sourcePri) {
            Write-Host "Copying Easydict.WinUI.pri to resources.pri"
            Copy-Item -Path $sourcePri -Destination $targetPri -Force
          } else {
            Write-Warning "Easydict.WinUI.pri not found"
          }

      - name: Update manifest for x64
        shell: pwsh
        run: |
          $manifestPath = "dotnet/src/Easydict.WinUI/Package.appxmanifest"
          $content = Get-Content $manifestPath -Raw
          $content = $content -replace 'ProcessorArchitecture="neutral"', 'ProcessorArchitecture="x64"'
          Set-Content $manifestPath $content

      - name: Create MSIX package
        working-directory: dotnet
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./msix
          winapp package `
            ./publish/x64 `
            --output ./msix/Easydict-ui-test-x64.msix `
            --manifest src/Easydict.WinUI/Package.appxmanifest `
            --skip-pri `
            --verbose

      - name: Fix MSIX MinVersion
        shell: pwsh
        run: |
          dotnet/scripts/Fix-MsixMinVersion.ps1 `
            -MsixPath "dotnet/msix/Easydict-ui-test-x64.msix"

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dotnet/publish/x64
          retention-days: 1

      - name: Upload MSIX package
        uses: actions/upload-artifact@v4
        with:
          name: msix-package
          path: dotnet/msix/
          retention-days: 1

      - name: Revert manifest changes
        if: always()
        shell: pwsh
        run: |
          git checkout -- dotnet/src/Easydict.WinUI/Package.appxmanifest

  # ── Job 2: WinUI Unit Tests (parallel) ──
  winui-tests:
    name: WinUI Unit Tests
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: dotnet/global.json

      - name: Install Windows App Runtime
        shell: pwsh
        run: |
          $url = "https://aka.ms/windowsappsdk/2.0/latest/windowsappruntimeinstall-x64.exe"
          $installer = Join-Path $env:TEMP "windowsappruntimeinstall-x64.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--quiet","--force" -Wait -NoNewWindow
          Write-Host "Windows App Runtime installed"

      - name: Build WinUI Unit Tests
        working-directory: dotnet
        run: |
          dotnet build tests/Easydict.WinUI.Tests/Easydict.WinUI.Tests.csproj `
            --configuration Release `
            -p:Platform=x64 `
            -p:BuildWorkerOutputs=false `
            -p:EnableInProcLongDocFallback=true `
            -p:WindowsAppSdkAutoInitialize=true

      - name: Run WinUI Unit Tests
        working-directory: dotnet
        run: |
          dotnet test tests/Easydict.WinUI.Tests/Easydict.WinUI.Tests.csproj `
            --configuration Release `
            --no-build `
            --verbosity normal `
            --logger "trx;LogFileName=winui-test-results.trx" `
            --logger "console;verbosity=detailed" `
            -p:Platform=x64 `
            --filter "Category=WinUI"

      - name: Surface failed test names as annotations
        if: failure()
        shell: pwsh
        working-directory: dotnet
        run: |
          $trx = Get-ChildItem -Recurse -Filter "winui-test-results.trx" | Select-Object -First 1
          if (-not $trx) {
            Write-Host "::error::No trx file produced — test step likely crashed before any test ran"
            exit 0
          }

          Write-Host "Parsing trx: $($trx.FullName) ($((Get-Item $trx.FullName).Length) bytes)"
          [xml]$xml = Get-Content $trx.FullName

          $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $ns.AddNamespace("t", "http://microsoft.com/schemas/VisualStudio/TeamTest/2010")

          # Surface actual failures. Skipped tests are recorded as NotExecuted in TRX and
          # should not be promoted to error annotations when another test fails.
          $bad = $xml.SelectNodes("//t:UnitTestResult[@outcome='Failed' or @outcome='Error' or @outcome='Timeout' or @outcome='Aborted']", $ns)
          Write-Host "Found $($bad.Count) failing tests"

          if ($bad.Count -eq 0) {
            $counters = $xml.SelectSingleNode("//t:ResultSummary/t:Counters", $ns)
            if ($counters) {
              Write-Host "::error::No failing UnitTestResult nodes found in trx, but step exited non-zero. Counters: $($counters.OuterXml)"
            } else {
              Write-Host "::error::trx contains no UnitTestResult nodes — the test runner may have crashed during startup"
            }
          }

          foreach ($t in $bad) {
            $name = $t.GetAttribute("testName")
            $outcome = $t.GetAttribute("outcome")
            $msgNode = $t.SelectSingleNode("t:Output/t:ErrorInfo/t:Message", $ns)
            $msg = if ($msgNode) { $msgNode.InnerText } else { "(no error message captured)" }
            # GitHub Actions workflow command escaping: % must be escaped first
            # (otherwise the later %0A / %0D / %3A / %2C escapes get corrupted),
            # then newlines/carriage returns, then the syntactic separators.
            $msg = $msg -replace "%", "%25" `
                        -replace "`r", "%0D" `
                        -replace "`n", "%0A" `
                        -replace ":", "%3A" `
                        -replace ",", "%2C"
            if ($msg.Length -gt 1500) { $msg = $msg.Substring(0, 1500) + "..." }
            Write-Host "::error title=WinUI test $outcome::$name%0A$msg"
          }

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: winui-test-results
          path: dotnet/**/TestResults/*.trx
          retention-days: 30

  # ── Job 3: UI Automation Tests (parallel shards) ──
  ui-automation:
    name: UI Automation (${{ matrix.shard.name }})
    runs-on: windows-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: "PopButton"
            filter: "Category=UIAutomation & (FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.PopButtonTests. | FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.PopButtonSelectionTests.)"
            suffix: "shard-1"
          - name: "Advanced"
            # MiniWindowFocusTests excluded pending investigation of re-open hotkey regression
            # surfaced once these test classes started running on CI.
            filter: "Category=UIAutomation & (FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.MiniWindowLongTextTests. | FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.PhoneticTranscriptionTests. | FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.DictionaryWebViewRenderingTests.)"
            suffix: "shard-2"
          - name: "Core & Settings"
            filter: "Category=UIAutomation & (FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.MainWindowTests. | FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.TranslationTests. | FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.WindowLifecycleTests. | FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.SettingsPageTests. | FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.SettingsPageScrollTests. | FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.DarkModeTests.)"
            suffix: "shard-3"
          - name: "Theme Contrast"
            filter: "Category=UIAutomation & FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.ThemeContrastTests."
            suffix: "theme-contrast"
          - name: "OCR"
            filter: "Category=UIAutomation & FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.OcrTests."
            suffix: "shard-4"
          - name: "LongDoc"
            filter: "Category=UIAutomation & FullyQualifiedName~Easydict.UIAutomation.Tests.Tests.LongDocTranslationTests."
            suffix: "shard-5"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: dotnet/global.json

      - name: Download MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: msix-package
          path: dotnet/msix

      - name: Enable Developer Mode (sideloading)
        shell: pwsh
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" `
            /t REG_DWORD /v AllowDevelopmentWithoutDevLicense /d 1 /f

      - name: Install Windows App Runtime
        shell: pwsh
        run: |
          $url = "https://aka.ms/windowsappsdk/2.0/latest/windowsappruntimeinstall-x64.exe"
          $installer = Join-Path $env:TEMP "windowsappruntimeinstall-x64.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--quiet","--force" -Wait -NoNewWindow
          Write-Host "Windows App Runtime installed"

      - name: Install MSIX package (register from extracted layout)
        shell: pwsh
        run: |
          $msixPath = "dotnet/msix/Easydict-ui-test-x64.msix"
          $extractDir = "dotnet/msix/extracted"
          Write-Host "Installing MSIX: $msixPath"

          # Remove any previous installation
          $existing = Get-AppxPackage -Name "xiaocang.EasydictforWindows" -ErrorAction SilentlyContinue
          if ($existing) {
            Write-Host "Removing existing installation..."
            Remove-AppxPackage -Package $existing.PackageFullName
            Start-Sleep -Seconds 2
          }

          # Extract MSIX (ZIP format) and register from manifest
          # This avoids code-signing requirements for CI testing
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Expand-Archive -Path $msixPath -DestinationPath $extractDir -Force

          $manifestPath = Join-Path $extractDir "AppxManifest.xml"
          if (-not (Test-Path $manifestPath)) {
            Write-Error "AppxManifest.xml not found in extracted MSIX"
            exit 1
          }

          Add-AppxPackage -Register $manifestPath
          Start-Sleep -Seconds 3

          # Verify installation
          $pkg = Get-AppxPackage -Name "xiaocang.EasydictforWindows"
          if (-not $pkg) {
            Write-Error "MSIX installation failed - package not found"
            exit 1
          }

          Write-Host "Installed: $($pkg.PackageFullName)"
          Write-Host "InstallLocation: $($pkg.InstallLocation)"
          Write-Host "PackageFamilyName: $($pkg.PackageFamilyName)"

          # Export for later steps
          echo "EASYDICT_PACKAGE_FAMILY_NAME=$($pkg.PackageFamilyName)" >> $env:GITHUB_ENV

      - name: Restore UI test dependencies
        working-directory: dotnet
        run: dotnet restore tests/Easydict.UIAutomation.Tests/Easydict.UIAutomation.Tests.csproj

      - name: Build UI Automation Tests
        working-directory: dotnet
        run: |
          dotnet build tests/Easydict.UIAutomation.Tests/Easydict.UIAutomation.Tests.csproj `
            --configuration Release --no-restore -p:Platform=x64

      - name: Run UI Automation Tests
        working-directory: dotnet
        env:
          SCREENSHOT_OUTPUT_DIR: ${{ github.workspace }}/screenshots
        run: |
          # Create screenshot output directory
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/screenshots"

          dotnet test tests/Easydict.UIAutomation.Tests/Easydict.UIAutomation.Tests.csproj `
            --configuration Release `
            --no-build `
            --verbosity normal `
            --logger "trx;LogFileName=ui-test-results.trx" `
            --logger "console;verbosity=detailed" `
            -p:Platform=x64 `
            --filter "${{ matrix.shard.filter }}"

      - name: Surface failed UI test names as annotations
        if: failure()
        shell: pwsh
        working-directory: dotnet
        run: |
          $trx = Get-ChildItem -Recurse -Filter "ui-test-results.trx" | Select-Object -First 1
          if (-not $trx) {
            Write-Host "::error::No trx file produced — test step likely crashed before any test ran"
            exit 0
          }

          Write-Host "Parsing trx: $($trx.FullName) ($((Get-Item $trx.FullName).Length) bytes)"
          [xml]$xml = Get-Content $trx.FullName

          $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $ns.AddNamespace("t", "http://microsoft.com/schemas/VisualStudio/TeamTest/2010")

          $bad = $xml.SelectNodes("//t:UnitTestResult[@outcome='Failed' or @outcome='Error' or @outcome='Timeout' or @outcome='Aborted']", $ns)
          Write-Host "Found $($bad.Count) failing UI tests"

          if ($bad.Count -eq 0) {
            $counters = $xml.SelectSingleNode("//t:ResultSummary/t:Counters", $ns)
            if ($counters) {
              Write-Host "::error::No failing UnitTestResult nodes found in trx, but step exited non-zero. Counters: $($counters.OuterXml)"
            } else {
              Write-Host "::error::trx contains no UnitTestResult nodes — the test runner may have crashed during startup"
            }
          }

          foreach ($t in $bad) {
            $name = $t.GetAttribute("testName")
            $outcome = $t.GetAttribute("outcome")
            $msgNode = $t.SelectSingleNode("t:Output/t:ErrorInfo/t:Message", $ns)
            $msg = if ($msgNode) { $msgNode.InnerText } else { "(no error message captured)" }
            $msg = $msg -replace "%", "%25" `
                        -replace "`r", "%0D" `
                        -replace "`n", "%0A" `
                        -replace ":", "%3A" `
                        -replace ",", "%2C"
            if ($msg.Length -gt 1500) { $msg = $msg.Substring(0, 1500) + "..." }
            Write-Host "::error title=UI test $outcome (${{ matrix.shard.name }})::$name%0A$msg"
          }

      - name: Publish theme contrast screenshot summary
        if: always() && matrix.shard.suffix == 'theme-contrast'
        shell: pwsh
        run: |
          $matrixDir = Join-Path "${{ github.workspace }}" "screenshots/theme-contrast-regression/theme-matrix"
          $galleryDir = Join-Path "${{ github.workspace }}" "screenshots/theme-contrast-regression"
          $summary = [System.Collections.Generic.List[string]]::new()
          $summary.Add("## Theme contrast regression screenshots")
          $summary.Add("")
          $summary.Add("Artifact: ``theme-contrast-regression-screenshots-theme-contrast``")
          $summary.Add("Path inside artifact: ``theme-matrix/``")

          if (-not (Test-Path $matrixDir)) {
            $summary.Add("")
            $summary.Add("No theme contrast screenshots were produced.")
            $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            exit 0
          }

          $screenshots = @(Get-ChildItem -Path $matrixDir -Filter "theme-contrast_*.png" | Sort-Object Name)
          $summary.Add("")
          $summary.Add("Generated **$($screenshots.Count)** screenshots.")

          if ($screenshots.Count -gt 0) {
            try {
              Add-Type -AssemblyName System.Drawing

              $columns = 4
              $thumbWidth = 190
              $thumbHeight = 170
              $labelHeight = 50
              $padding = 12
              $rows = [int][Math]::Ceiling($screenshots.Count / [double]$columns)
              $sheetWidth = ($columns * $thumbWidth) + (($columns + 1) * $padding)
              $sheetHeight = ($rows * ($labelHeight + $thumbHeight + $padding)) + $padding

              $sheet = [System.Drawing.Bitmap]::new($sheetWidth, $sheetHeight)
              $graphics = [System.Drawing.Graphics]::FromImage($sheet)
              $font = [System.Drawing.Font]::new("Segoe UI", 8)
              $brush = [System.Drawing.SolidBrush]::new([System.Drawing.Color]::FromArgb(32, 36, 43))
              $tileBrush = [System.Drawing.SolidBrush]::new([System.Drawing.Color]::FromArgb(245, 247, 250))
              $borderPen = [System.Drawing.Pen]::new([System.Drawing.Color]::FromArgb(205, 213, 224))

              try {
                $graphics.Clear([System.Drawing.Color]::White)
                $graphics.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
                $graphics.TextRenderingHint = [System.Drawing.Text.TextRenderingHint]::ClearTypeGridFit

                for ($i = 0; $i -lt $screenshots.Count; $i++) {
                  $row = [Math]::Floor($i / $columns)
                  $column = $i % $columns
                  $x = $padding + ($column * ($thumbWidth + $padding))
                  $y = $padding + ($row * ($labelHeight + $thumbHeight + $padding))
                  $tile = [System.Drawing.Rectangle]::new($x, $y, $thumbWidth, $labelHeight + $thumbHeight)
                  $graphics.FillRectangle($tileBrush, $tile)
                  $graphics.DrawRectangle($borderPen, $tile)

                  $name = $screenshots[$i].BaseName -replace "theme-contrast_", ""
                  $graphics.DrawString($name, $font, $brush, [System.Drawing.RectangleF]::new($x + 6, $y + 6, $thumbWidth - 12, $labelHeight - 8))

                  $image = [System.Drawing.Image]::FromFile($screenshots[$i].FullName)
                  try {
                    $scale = [Math]::Min(($thumbWidth - 12) / [double]$image.Width, ($thumbHeight - 12) / [double]$image.Height)
                    $drawWidth = [int]($image.Width * $scale)
                    $drawHeight = [int]($image.Height * $scale)
                    $drawX = $x + [int](($thumbWidth - $drawWidth) / 2)
                    $drawY = $y + $labelHeight + [int](($thumbHeight - $drawHeight) / 2)
                    $graphics.DrawImage($image, $drawX, $drawY, $drawWidth, $drawHeight)
                  }
                  finally {
                    $image.Dispose()
                  }
                }

                New-Item -ItemType Directory -Force -Path $galleryDir | Out-Null
                $galleryPath = Join-Path $galleryDir "theme-contrast-regression-gallery.png"
                $sheet.Save($galleryPath, [System.Drawing.Imaging.ImageFormat]::Png)
              }
              finally {
                $borderPen.Dispose()
                $tileBrush.Dispose()
                $brush.Dispose()
                $font.Dispose()
                $graphics.Dispose()
                $sheet.Dispose()
              }

              $galleryBytes = [System.IO.File]::ReadAllBytes($galleryPath)
              $summary.Add("")
              $summary.Add("### Gallery")
              if ($galleryBytes.Length -le 600000) {
                $galleryBase64 = [Convert]::ToBase64String($galleryBytes)
                $summary.Add("<img alt=""Theme contrast regression screenshot gallery"" src=""data:image/png;base64,$galleryBase64"" />")
              } else {
                $summary.Add("Gallery image was generated at ``theme-contrast-regression-gallery.png`` in the artifact.")
              }
            }
            catch {
              $summary.Add("")
              $summary.Add("Could not generate inline gallery: $($_.Exception.Message)")
            }

            $summary.Add("")
            $summary.Add("### Screenshot files")
            foreach ($screenshot in $screenshots) {
              $summary.Add("- ``theme-matrix/$($screenshot.Name)``")
            }
          }

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-screenshots-${{ matrix.shard.suffix }}
          path: |
            screenshots/
          retention-days: 30

      - name: Upload theme contrast regression screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: theme-contrast-regression-screenshots-${{ matrix.shard.suffix }}
          path: screenshots/theme-contrast-regression/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload baseline candidates
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-candidates-${{ matrix.shard.suffix }}
          path: |
            screenshots/baseline-candidates/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-automation-test-results-${{ matrix.shard.suffix }}
          path: dotnet/**/TestResults/*.trx
          retention-days: 30

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-msix-${{ matrix.shard.suffix }}
          path: dotnet/msix/Easydict-ui-test-x64.msix
          retention-days: 7

      - name: Uninstall MSIX package
        if: always()
        shell: pwsh
        run: |
          $pkg = Get-AppxPackage -Name "xiaocang.EasydictforWindows" -ErrorAction SilentlyContinue
          if ($pkg) {
            Write-Host "Uninstalling: $($pkg.PackageFullName)"
            Remove-AppxPackage -Package $pkg.PackageFullName
          } else {
            Write-Host "Package already uninstalled"
          }
