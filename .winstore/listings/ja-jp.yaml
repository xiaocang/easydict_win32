language: ja-jp
title: Easydict for Windows
shortTitle: Easydict
sortTitle: Easydict
voiceTitle: イージーディクト
shortDescription: 簡単に単語を調べたりテキストを翻訳
description: |-
  Easydict for Windows は、Copilot+ PC 強化型ローカル AI 翻訳に対応した、無料・オープンソースの翻訳・辞書ツールです。
  - Copilot+ PC 強化型ローカル AI — Copilot+ PC では Phi Silica、通常の Windows PC では Foundry Local、オフラインフォールバックとして OpenVINO NLLB-200
  - 20+ 翻訳サービス — Google、DeepL、Bing、OpenAI、Gemini、DeepSeek、Groq、智譜 AI など
  - リアルタイム AI ストリーミング翻訳、OCR スクリーンショット翻訳、PDF/Markdown 長文ドキュメント翻訳

  40+ TOPS NPU を搭載した対応 Copilot+ PC では、Phi Silica により高速・プライベートなデバイス上翻訳を実現。通常の Windows PC でも標準の翻訳機能はすべてご利用いただけます。

  Easydict はデバイス上のローカル AI、従来の翻訳エンジン、最新のクラウド AI モデルを統一されたワークフローに統合し、単語検索から全文書翻訳までシームレスに対応します。macOS 版 Easydict の Windows 移植版で、最新の .NET と WinUI 3 によりネイティブ体験を提供します。

  主な特徴：
  - オールインワン翻訳：Google、DeepL、Bing など 20+ サービス
  - マルチ AI 対応：OpenAI、Gemini、DeepSeek、Groq、智譜 AI など
  - OCR スクリーンショット翻訳：Windows ネイティブ OCR を使用
  - PDF・長文翻訳：レイアウトと数式を保持
  - MDX カスタム辞書対応
  - ネイティブ Windows 体験：選択即翻訳
  - 複数 LLM 対応のリアルタイム AI ストリーミング翻訳
  - 複数のウィンドウモード、グローバルショートカット、クリップボード監視、システムトレイ
  - テキスト読み上げ、ダークモード、高 DPI 表示

  Easydict には AI 生成の翻訳・文法校正機能が含まれます。AI の出力にはばらつきがある場合があるため、利用者ご自身でご確認ください。
