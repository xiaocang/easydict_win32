language: ko-kr
title: Easydict for Windows
shortTitle: Easydict
sortTitle: Easydict
voiceTitle: 이지딕트
shortDescription: 쉽게 단어를 찾고 텍스트를 번역
description: |-
  Easydict for Windows는 Copilot+ PC 강화 로컬 AI 번역을 지원하는 무료 오픈소스 번역·사전 도구입니다.
  - Copilot+ PC 강화 로컬 AI — Copilot+ PC에서는 Phi Silica, 일반 Windows PC에서는 Foundry Local, 오프라인 대안으로 OpenVINO NLLB-200
  - 20+ 번역 서비스 — Google, DeepL, Bing, OpenAI, Gemini, DeepSeek, Groq, Zhipu AI 등
  - 실시간 AI 스트리밍 번역, OCR 스크린샷 번역, PDF/Markdown 장문서 번역

  40+ TOPS NPU를 탑재한 지원 Copilot+ PC에서는 Phi Silica로 빠르고 사적인 온디바이스 번역을 제공합니다. 모든 Windows 기기에서 표준 번역 기능은 그대로 사용 가능합니다.

  Easydict는 온디바이스 로컬 AI, 전통적인 번역 엔진, 최신 클라우드 AI 모델을 통합된 워크플로로 결합하여 빠른 단어 검색부터 전체 문서 번역까지 처리합니다. 인기 있는 macOS Easydict 앱의 Windows 이식 버전으로, 최신 .NET 및 WinUI 3 기술로 구축되어 네이티브 Windows 경험을 제공합니다.

  주요 특징:
  - 올인원 번역: Google, DeepL, Bing 등 20+ 서비스
  - 다중 AI 지원: OpenAI, Gemini, DeepSeek, Groq, Zhipu AI 등
  - OCR 스크린샷 번역: Windows 네이티브 OCR 사용
  - PDF 및 장문 번역: 레이아웃과 수식 보존
  - MDX 사용자 정의 사전 지원
  - 네이티브 Windows 경험: 선택 즉시 번역
  - 다중 LLM을 활용한 실시간 AI 스트리밍 번역
  - 다중 창 모드, 글로벌 단축키, 클립보드 모니터링, 시스템 트레이
  - 텍스트 음성 변환, 다크 모드, 높은 DPI 표시

  Easydict에는 AI 생성 번역 및 문법 교정 기능이 포함됩니다. AI 출력은 다를 수 있으므로 사용자가 검토해 주십시오.
features:
- 'Copilot+ PC 강화 로컬 AI 번역: Phi Silica, Foundry Local 및 OpenVINO NLLB-200 오프라인 대안'
- 'Copilot+ PC(40+ TOPS)의 NPU 가속 온디바이스 번역, 일반 Windows PC에서는 자동 폴백'
- Google, Bing, DeepL, OpenAI, Gemini, DeepSeek, Volcano Engine을 포함한 20+ 번역 서비스
- AI 서비스를 통한 실시간 스트리밍 번역
- '다중 창 모드: 메인, 미니, 고정 창'
- 글로벌 단축키로 모든 애플리케이션에서 즉시 번역
- 시스템 트레이 통합으로 백그라운드 실행
- 클립보드 모니터링으로 자동 번역
- 시스템 설정에 연동되는 다크 및 라이트 테마
- 원문과 번역문 텍스트 음성 변환
- HTTP 프록시 지원
- Ollama를 통한 로컬 LLM 지원
- 사용자 정의 OpenAI 호환 서비스 지원
- 높은 DPI 및 멀티 모니터 지원
- '마우스 선택 번역: 텍스트 선택 후 플로팅 버튼으로 즉시 번역'
- 'OCR 스크린샷 번역: Snipaste 스타일의 화면 캡처로 영역을 선택하고 OCR로 텍스트를 인식하여 즉시 번역. Windows OCR API 사용'
- '문법 교정: AI 기반 문법 교정, 오류에 대한 상세한 설명 제공'
- '장문서 번역: PDF, 텍스트, Markdown 파일 번역 지원. ML 레이아웃 감지, 수식 보호, 병렬 처리, 이중 언어 출력 기능'
- 'MDX 사전: MDict (.mdx) 사전 파일을 가져와 풍부한 HTML 렌더링으로 오프라인 단어 검색'
