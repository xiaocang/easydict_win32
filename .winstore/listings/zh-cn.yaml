language: zh-cn
title: Easydict Windows 版
shortTitle: Easydict
sortTitle: Easydict
voiceTitle: 易词典
shortDescription: 轻松查词翻译
description: |-
  Easydict Windows 版是一款免费开源的翻译与词典工具，提供 Copilot+ PC 增强型本地 AI 翻译。
  - Copilot+ PC 增强型本地 AI — Copilot+ PC 上使用 Phi Silica，普通 Windows PC 上使用 Foundry Local，OpenVINO NLLB-200 作为离线兜底
  - 20+ 翻译服务 — Google、DeepL、必应、OpenAI、Gemini、DeepSeek、Groq、智谱 AI 等
  - 实时 AI 流式翻译、OCR 截图翻译、PDF/Markdown 长文档翻译

  在搭载 40+ TOPS NPU 的 Copilot+ PC 上，Easydict 使用 Phi Silica 进行快速、私密的设备端翻译。普通 Windows PC 上的标准翻译功能仍完全可用。

  Easydict 将设备端本地 AI、传统翻译引擎和现代云端 AI 模型整合为统一的工作流，从快速查词到全文翻译。本应用是热门 macOS Easydict 应用的 Windows 移植版，采用现代 .NET 和 WinUI 3 技术构建，提供原生 Windows 体验。

  核心亮点：
  - 一站式翻译：Google、DeepL、必应等 20+ 翻译服务
  - 多 AI 支持：OpenAI、Gemini、DeepSeek、Groq、智谱 AI 等
  - OCR 截图翻译：基于 Windows 原生 OCR
  - PDF 与长文翻译：支持版面和公式保留
  - MDX 自定义词典：满足高级查词需求
  - 原生 Windows 体验：选词即译
  - 多种 LLM 实时 AI 流式翻译
  - 多种窗口模式、全局快捷键、剪贴板监听、系统托盘
  - 文字转语音、深色模式、高 DPI 显示

  Easydict 包含 AI 生成的翻译和语法纠错功能，AI 输出可能存在差异，请用户自行审阅。

  注意：部分翻译服务可能因区域限制、网络环境或需要 API 密钥等原因无法使用。
features:
- 'Copilot+ PC 增强型本地 AI 翻译：Phi Silica、Foundry Local 和 OpenVINO NLLB-200 离线兜底'
- 支持 Copilot+ PC（40+ TOPS）的 NPU 加速设备端翻译，普通 Windows PC 自动回退
- 20+ 翻译服务，包括 Google、必应、DeepL、OpenAI、Gemini、DeepSeek 和火山翻译
- AI 服务实时流式翻译
- '多种窗口模式：主窗口、迷你窗口和固定窗口'
- 全局快捷键，从任意应用中即时翻译
- 系统托盘集成，支持后台运行
- 剪贴板监听，自动翻译
- 深色和浅色主题，跟随系统设置
- 文字转语音，朗读原文和译文
- HTTP 代理支持
- 通过 Ollama 支持本地 LLM
- 自定义 OpenAI 兼容服务支持
- 高 DPI 和多显示器支持
- 划词翻译，选中文本点击浮动按钮即可翻译
- 'OCR 截图翻译：类似 Snipaste 的截图体验，选择屏幕区域，OCR 识别文字并即时翻译，使用 Windows OCR API'
- '语法纠错：AI 智能语法纠错，详细解释错误原因'
- '长文档翻译：支持 PDF、纯文本和 Markdown 文件翻译，具备 ML 版面检测、公式保护、并行处理和双语导出功能'
- 'MDX 词典：导入 MDict (.mdx) 词典文件，支持离线查词和丰富的 HTML 渲染'
